plugins {
    id 'java-library'       // API 模組應使用 java-library
    id 'maven-publish'      // 用於發布到 Maven/Repsy
}

// 專案基本資訊
group = 'noie.linmimeng'
version = '2.0.0'

java {
    // 確保使用 Java 21
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
    // 引入 Paper 倉庫，因為 API 介面中會用到 Player, ItemStack 等 Bukkit 物件
    maven { url "https://repo.papermc.io/repository/maven-public/" }
}

dependencies {
    // 1. Paper API (CompileOnly)
    // 我們只在編譯時需要引用這些介面，不需要把 Paper 核心打包進去
    compileOnly "io.papermc.paper:paper-api:1.21.4-R0.1-SNAPSHOT"

    // 2. Lombok (你原本的依賴)
    compileOnly 'org.projectlombok:lombok:1.18.36'
    annotationProcessor 'org.projectlombok:lombok:1.18.36'

    // 如果你的 API 有用到 @Nullable 等註解，建議加入此依賴
    compileOnly 'org.jetbrains:annotations:24.0.0'
}

// 生成源碼和文檔 JAR（方便其他開發者查看源碼）
java {
    withSourcesJar()
    // 暫時跳過 JavaDoc 生成（有警告但不影響發布）
    // withJavadocJar()
}

// 發布設定 (Repsy)
publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            // 設定發布出去的 artifactId (別人引用時的名字)
            artifactId = 'noiedigitalsystem-api'

            // 生成的 POM 資訊 (讓使用者知道這是什麼)
            pom {
                name = 'NoieDigitalSystem API'
                description = 'The Protocol Layer for NoieDigitalSystem (NDS) - Next-Generation Economy Protocol'
                url = 'https://github.com/Misty4119/nds-docs'
                
                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }
                
                developers {
                    developer {
                        id = 'linmimeng'
                        name = 'LinMimeng'
                    }
                }
            }
        }
    }

    // 設定上傳目標：Repsy.io
    repositories {
        maven {
            url = uri("https://repo.repsy.io/mvn/linmimeng/releases")
            credentials {
                // 從 gradle.properties 讀取帳密 (最安全)
                // 如果找不到，嘗試從環境變數讀取
                username = project.findProperty("repsyUsername") ?: System.getenv("REPSY_USERNAME")
                password = project.findProperty("repsyPassword") ?: System.getenv("REPSY_PASSWORD")
            }
        }
    }
}

// 設定編碼為 UTF-8，避免中文註解亂碼
tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    // 啟用所有警告
    options.compilerArgs += ['-Xlint:all', '-Xlint:-processing']
}

// 發布前驗證任務
tasks.named('publish') {
    dependsOn 'build'
    doFirst {
        // 檢查版本號格式
        if (!project.version.matches(/^\d+\.\d+\.\d+$/)) {
            throw new RuntimeException("版本號格式錯誤：${project.version}，應為 MAJOR.MINOR.PATCH 格式")
        }
        
        // 檢查認證信息
        def username = project.findProperty("repsyUsername") ?: System.getenv("REPSY_USERNAME")
        def password = project.findProperty("repsyPassword") ?: System.getenv("REPSY_PASSWORD")
        
        if (!username || !password) {
            throw new RuntimeException("缺少 Repsy 認證信息！請在 gradle.properties 中設置 repsyUsername 和 repsyPassword，或設置環境變數 REPSY_USERNAME 和 REPSY_PASSWORD")
        }

        println "準備發布 ${project.group}:${project.findProperty('artifactId') ?: 'noiedigitalsystem-api'}:${project.version}"
    }
}
