plugins {
    id 'java-library'       // API 模組應使用 java-library
    id 'maven-publish'      // 用於發布到 Maven/Repsy
}

// 專案基本資訊
group = 'noie.linmimeng'
version = '2.0.0'

java {
    // 確保使用 Java 21
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
    // 引入 Paper 倉庫，因為 API 介面中會用到 Player, ItemStack 等 Bukkit 物件
    maven { url "https://repo.papermc.io/repository/maven-public/" }
}

dependencies {
    // 1. Paper API (CompileOnly)
    // 我們只在編譯時需要引用這些介面，不需要把 Paper 核心打包進去
    compileOnly "io.papermc.paper:paper-api:1.21.4-R0.1-SNAPSHOT"

    // 2. Lombok (你原本的依賴)
    compileOnly 'org.projectlombok:lombok:1.18.36'
    annotationProcessor 'org.projectlombok:lombok:1.18.36'

    // 如果你的 API 有用到 @Nullable 等註解，建議加入此依賴
    compileOnly 'org.jetbrains:annotations:24.0.0'
}

// 發布設定 (Repsy)
publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            // 設定發布出去的 artifactId (別人引用時的名字)
            artifactId = 'noiedigitalsystem-api'

            // 生成的 POM 資訊 (讓使用者知道這是什麼)
            pom {
                name = 'NoieDigitalSystem API'
                description = 'The Protocol Layer for NoieDigitalSystem (NDS)'
                url = 'https://github.com/Misty4119/nds-docs'
            }
        }
    }

    // 設定上傳目標：Repsy.io
    repositories {
        maven {
            // ⚠️ 請修改：將 USERNAME 換成你的 Repsy 帳號
            url = uri("https://repo.repsy.io/mvn/linmimeng/releases")
            credentials {
                // 從 gradle.properties 讀取帳密 (最安全)
                // 如果找不到，嘗試從環境變數讀取
                username = project.findProperty("repsyUsername") ?: System.getenv("REPSY_USERNAME")
                password = project.findProperty("repsyPassword") ?: System.getenv("REPSY_PASSWORD")
            }
        }
    }
}

// 設定編碼為 UTF-8，避免中文註解亂碼
tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}